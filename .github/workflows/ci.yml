name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint • Typecheck • Build • Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: test
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pin to an exact 10.x. `version: 10` resolves to "latest 10.x", and
          # 10.34.0 was published with a 404 tarball on the npm registry
          # (registry entry exists, .tgz missing), breaking CI on every PR.
          # Bump deliberately rather than tracking the floating tag.
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r --if-present test
