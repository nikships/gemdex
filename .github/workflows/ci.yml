name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint • Typecheck • Build • Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: test
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pin to an exact 10.x. `version: 10` resolves to "latest 10.x", and
          # 10.34.0 was published with a 404 tarball on the npm registry
          # (registry entry exists, .tgz missing), breaking CI on every PR.
          # Bump deliberately rather than tracking the floating tag.
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r --if-present test

  desktop-app:
    name: Desktop app (native SwiftUI · macOS)
    runs-on: macos-14 # Apple Silicon (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Build native app bundle (no Sparkle, no sidecar)
        working-directory: packages/app
        run: bash macos/build-app.sh

      - name: Verify bundle layout
        working-directory: packages/app
        run: |
          set -euo pipefail
          APP="build/Gemdex Memory.app"
          test -x "$APP/Contents/MacOS/GemdexMemory"
          test -f "$APP/Contents/Info.plist"
          test -f "$APP/Contents/Resources/startup-intro.mp4"
          test -f "$APP/Contents/Resources/brand/logo-mark.png"
          plutil -lint "$APP/Contents/Info.plist"
          echo "Bundle layout OK."

  byoi-integration:
    name: BYOI integration (Postgres + MCP + sidecar)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16-bookworm
        env:
          POSTGRES_DB: gemdex_integration
          POSTGRES_USER: gemdex
          POSTGRES_PASSWORD: integration-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gemdex -d gemdex_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      BYOI_TEST_DATABASE_URL: postgres://gemdex:integration-password@127.0.0.1:5432/gemdex_integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run deterministic BYOI integration
        run: pnpm test:byoi

  docker:
    name: Docker compose smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose configuration
        working-directory: packages/server
        run: docker compose --env-file .env.example config

      - name: Build and start BYOI stack
        working-directory: packages/server
        run: docker compose --env-file .env.example up -d --build

      - name: Wait for Gemdex health
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8765/v1/health | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file packages/server/.env.example -f packages/server/docker-compose.yml logs
          exit 1

      - name: Stop BYOI stack
        if: always()
        working-directory: packages/server
        run: docker compose --env-file .env.example down --volumes
