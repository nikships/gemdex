name: Release (Windows)

on:
  push:
    branches: [main]
    paths:
      - "packages/app/**"
      - "packages/core/**"
      - "packages/mcp/**"
      - ".github/workflows/release-windows.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.3.1). Leave blank for the rolling desktop-latest build."
        required: false
        default: ""

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build package and publish
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Install zero-native CLI + framework
        run: npm install -g zero-native@0.2.0

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Install Zig 0.16
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Resolve zero-native framework path
        id: zn
        shell: pwsh
        run: |
          $path = Join-Path (npm root -g).Trim() "zero-native"
          "path=$path" >> $env:GITHUB_OUTPUT

      - name: Read app version from manifest
        id: meta
        shell: pwsh
        run: |
          $manifest = Get-Content packages/app/app.zon -Raw
          if ($manifest -notmatch '\.version\s*=\s*"([^"]+)"') {
            Write-Error "Could not read app version from packages/app/app.zon"
            exit 1
          }
          "version=$($Matches[1])" >> $env:GITHUB_OUTPUT
          "App version: $($Matches[1])"

      - name: Validate manifest
        working-directory: packages/app
        run: zero-native validate app.zon

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build frontend
        working-directory: packages/app/frontend
        run: npm install && npm run build

      - name: Build Windows package (ReleaseFast)
        working-directory: packages/app
        run: zig build package -Dplatform=windows -Dpackage-target=windows -Doptimize=ReleaseFast "-Dzero-native-path=${{ steps.zn.outputs.path }}"

      - name: Stage bundled sidecar runtime
        shell: pwsh
        run: |
          $packageDir = Get-ChildItem packages/app/zig-out/package -Directory -Filter "gemdex-memory-*-windows-ReleaseFast" | Select-Object -First 1
          if (!$packageDir) {
            Write-Error "Expected Windows package directory missing under packages/app/zig-out/package"
            exit 1
          }

          $resourcesDir = Join-Path $packageDir.FullName "resources"
          New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null

          $sidecarDir = Join-Path $resourcesDir "sidecar"
          if (Test-Path $sidecarDir) {
            Remove-Item -LiteralPath $sidecarDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $sidecarDir | Out-Null

          $packDir = Join-Path $env:RUNNER_TEMP "gemdex-packs"
          if (Test-Path $packDir) {
            Remove-Item -LiteralPath $packDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $packDir | Out-Null
          pnpm --filter gemdex-core pack --pack-destination $packDir
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          pnpm --filter gemdex-mcp pack --pack-destination $packDir
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $corePack = Get-ChildItem $packDir -Filter "gemdex-core-*.tgz" | Select-Object -First 1
          $mcpPack = Get-ChildItem $packDir -Filter "gemdex-mcp-*.tgz" | Select-Object -First 1
          if (!$corePack -or !$mcpPack) {
            Write-Error "Expected gemdex-core and gemdex-mcp package tarballs in $packDir"
            exit 1
          }

          npm install --prefix $sidecarDir --omit=dev $corePack.FullName $mcpPack.FullName
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $mcpPackageDir = Join-Path $sidecarDir "node_modules/gemdex-mcp"
          Copy-Item -Path (Join-Path $mcpPackageDir "dist") -Destination (Join-Path $sidecarDir "dist") -Recurse -Force
          Copy-Item -Path (Join-Path $mcpPackageDir "package.json") -Destination (Join-Path $sidecarDir "package.json") -Force
          Get-ChildItem $sidecarDir -Recurse -Directory -Include dist-types,types,test,tests,__tests__,docs,doc,example,examples | Remove-Item -Recurse -Force
          Get-ChildItem $sidecarDir -Recurse -File -Include *.d.ts,*.map,*.tsbuildinfo,*.md,*.markdown,LICENSE,LICENSE.*,CHANGELOG*,README* | Remove-Item -Force

          $nodeVersion = (node -p "process.version.slice(1)").Trim()
          $nodeZip = "node-v$nodeVersion-win-x64.zip"
          $nodeUrl = "https://nodejs.org/dist/v$nodeVersion/$nodeZip"
          $nodeWorkDir = Join-Path $env:RUNNER_TEMP "gemdex-node-$nodeVersion"
          $nodeZipPath = Join-Path $nodeWorkDir $nodeZip
          $nodeDir = Join-Path $resourcesDir "node"
          if (Test-Path $nodeWorkDir) {
            Remove-Item -LiteralPath $nodeWorkDir -Recurse -Force
          }
          if (Test-Path $nodeDir) {
            Remove-Item -LiteralPath $nodeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $nodeWorkDir | Out-Null
          Invoke-WebRequest -Uri $nodeUrl -OutFile $nodeZipPath
          Expand-Archive -Path $nodeZipPath -DestinationPath $nodeWorkDir
          $expandedNode = Get-ChildItem $nodeWorkDir -Directory -Filter "node-v*-win-x64" | Select-Object -First 1
          if (!$expandedNode) {
            Write-Error "Could not find expanded Node directory in $nodeWorkDir"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path $nodeDir | Out-Null
          Copy-Item -Path (Join-Path $expandedNode.FullName "*") -Destination $nodeDir -Recurse -Force

          $nodeExe = Join-Path $nodeDir "node.exe"
          $sidecarEntry = Join-Path $sidecarDir "dist/index.js"
          if (!(Test-Path $nodeExe)) {
            Write-Error "Bundled node.exe missing: $nodeExe"
            exit 1
          }
          if (!(Test-Path $sidecarEntry)) {
            Write-Error "Bundled sidecar entrypoint missing: $sidecarEntry"
            exit 1
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $packageDir = Get-ChildItem packages/app/zig-out/package -Directory -Filter "gemdex-memory-*-windows-ReleaseFast" | Select-Object -First 1
          if (!$packageDir) {
            Write-Error "Expected Windows package directory missing under packages/app/zig-out/package"
            exit 1
          }
          $appExe = Join-Path $packageDir.FullName "bin/gemdex-memory.exe"
          if (!(Test-Path $appExe)) {
            Write-Error "Expected app executable missing: $appExe"
            exit 1
          }
          $bundledNode = Join-Path $packageDir.FullName "resources/node/node.exe"
          if (!(Test-Path $bundledNode)) {
            Write-Error "Expected bundled Node runtime missing: $bundledNode"
            exit 1
          }
          $bundledSidecar = Join-Path $packageDir.FullName "resources/sidecar/dist/index.js"
          if (!(Test-Path $bundledSidecar)) {
            Write-Error "Expected bundled sidecar missing: $bundledSidecar"
            exit 1
          }
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6/ISCC.exe"
          if (!(Test-Path $iscc)) {
            Write-Error "ISCC.exe was not found at $iscc"
            exit 1
          }
          $outputDir = Join-Path (Resolve-Path "packages/app/zig-out/package") "installer"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          & $iscc `
            "/DAppVersion=${{ steps.meta.outputs.version }}" `
            "/DSourceDir=$($packageDir.FullName)" `
            "/DOutputDir=$outputDir" `
            "packages/app/windows/installer.iss"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $installer = Join-Path $outputDir "Gemdex-Memory-${{ steps.meta.outputs.version }}-windows-x64-setup.exe"
          if (!(Test-Path $installer)) {
            Write-Error "Expected installer missing: $installer"
            exit 1
          }
          "INSTALLER_PATH=$installer" >> $env:GITHUB_ENV

      - name: Determine release target
        id: release
        shell: pwsh
        run: |
          $tagInput = "${{ github.event.inputs.tag }}"
          if ($tagInput) {
            "tag=$tagInput" >> $env:GITHUB_OUTPUT
            "name=Gemdex Memory $tagInput" >> $env:GITHUB_OUTPUT
          } else {
            "tag=desktop-windows-latest" >> $env:GITHUB_OUTPUT
            "name=Gemdex Memory ${{ steps.meta.outputs.version }} Windows (build $($env:GITHUB_SHA.Substring(0, 7)))" >> $env:GITHUB_OUTPUT
          }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          prerelease: false
          make_latest: false
          fail_on_unmatched_files: true
          files: ${{ env.INSTALLER_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
