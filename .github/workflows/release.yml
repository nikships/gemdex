name: Release

# One unified release pipeline for the whole repo. Any change to any package
# pushed to main bumps a SINGLE shared version (the root VERSION file, stamped
# into every package by scripts/sync-version.mjs) and then releases every
# artifact at that one version:
#   • gemdex-core, gemdex-mcp, gemdex-server  → npmjs.org
#   • @nikships/{gemdex-core,gemdex-mcp,gemdex-server} → GitHub Packages
#   • the macOS app → a signed, notarized DMG on a versioned GitHub release
#     (which is what makes Sparkle actually offer the update).
#
# Flow: prepare (bump + commit) → { npm → github-packages, macos } in parallel.

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  # Never run two releases at once and never cancel one mid-notarization.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump + sync unified version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Pushes made with the default GITHUB_TOKEN do NOT re-trigger workflows
          # (GitHub policy), so the bump commit below can't loop this workflow.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Patch-bump + sync version across all packages
        id: bump
        run: |
          set -euo pipefail
          VERSION="$(node scripts/sync-version.mjs --bump | tail -n1)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Unified version is now $VERSION"

      - name: Commit + push bump to main
        id: push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json packages/core/package.json \
            packages/mcp/package.json packages/server/package.json packages/app/VERSION
          # [skip ci] is belt-and-suspenders; GITHUB_TOKEN pushes already don't
          # re-trigger workflows. Downstream jobs check out this exact SHA.
          git commit -m "Release v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  npm:
    name: Publish to npm
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish gemdex-core, gemdex-mcp, gemdex-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in core mcp server; do
            name=$(node -p "require('./packages/$dir/package.json').name")
            version=$(node -p "require('./packages/$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already on npm; skipping."
            else
              pnpm --filter "$name" publish --access public --no-git-checks
            fi
          done

  github-packages:
    name: Publish to GitHub Packages (@nikships)
    needs: [prepare, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node.js (auth for GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@nikships"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Rewrite package.json files for the @nikships scope
        run: node scripts/prepare-gh-packages.mjs

      - name: Refresh workspace graph after rename
        # The renames invalidate the frozen lockfile for these workspace entries;
        # a relaxed install reattaches them under their new names so
        # `pnpm --filter` and `workspace:*` resolution both see the scoped packages.
        run: pnpm install --no-frozen-lockfile

      - name: Publish scoped core, mcp, server to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for dir in core mcp server; do
            name=$(node -p "require('./packages/$dir/package.json').name")
            version=$(node -p "require('./packages/$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already on GitHub Packages; skipping."
            else
              # --ignore-scripts: the dist was already built and import-rewritten
              # above. A prepublishOnly rebuild would rimraf dist and recompile
              # with the unscoped `gemdex-core` specifier, which no longer
              # resolves after the @nikships rename — so skip it.
              pnpm --filter "$name" publish --no-git-checks --ignore-scripts
            fi
          done

  macos:
    name: macOS · sign · notarize · DMG · release
    needs: prepare
    runs-on: macos-14 # Apple Silicon (arm64)
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Show Swift toolchain
        run: swift --version

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript workspace (core + mcp dist for the bundled sidecar)
        run: pnpm build

      - name: Fetch Sparkle (framework + tools)
        working-directory: packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKLE_VERSION: "2.9.2"
        run: |
          set -euo pipefail
          mkdir -p third_party/sparkle
          gh release download "$SPARKLE_VERSION" \
            --repo sparkle-project/Sparkle \
            --pattern "Sparkle-*.tar.xz" \
            --dir third_party/sparkle --clobber
          tar -xf third_party/sparkle/Sparkle-*.tar.xz -C third_party/sparkle
          rm -f third_party/sparkle/Sparkle-*.tar.xz
          test -d third_party/sparkle/Sparkle.framework
          test -x third_party/sparkle/bin/sign_update

      - name: Import Developer ID certificate into a temp keychain
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          if [ -z "$MAC_CERTS" ]; then
            echo "::error::MAC_CERTS secret is empty — cannot sign."
            exit 1
          fi
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # Keep the login/system keychains in the search list so codesign can
          # still find the Apple intermediate certs.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          echo "$MAC_CERTS" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -A
          rm -f cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "Signing identities available:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build native app bundle (Sparkle + bundled sidecar)
        working-directory: packages/app
        env:
          GEMDEX_SPARKLE: "1"
        run: bash macos/build-app.sh --with-sidecar

      - name: Sign · notarize · staple · DMG
        working-directory: packages/app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="build/Gemdex Memory.app"
          DMG="build/Gemdex-Memory-${APP_VERSION}-macos-arm64.dmg"

          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain."
            exit 1
          fi
          echo "Signing identity: $IDENTITY"

          echo "==> Embedding + signing Sparkle (inside-out, before outer sign)"
          SIGN_IDENTITY="$IDENTITY" bash macos/embed-sparkle.sh "$APP"

          echo "==> Deep-signing bundle (sidecar native libs + Node w/ JIT + outer app)"
          SIGN_IDENTITY="$IDENTITY" bash macos/sign-app.sh "$APP"

          echo "==> Verifying dynamic-link layout (guards against dyld 'Library missing' at launch)"
          # A hardened binary aborts at launch if any LC_RPATH is a bare relative
          # path (e.g. "Frameworks" instead of "@executable_path/../Frameworks").
          # Catch that here instead of shipping a DMG that crashes on every Mac.
          EXE="$APP/Contents/MacOS/GemdexMemory"
          BAD_RPATHS=$(otool -l "$EXE" \
            | awk '/LC_RPATH/{f=1;next} f&&/path /{print $2;f=0}' \
            | grep -vE '^(/|@)' || true)
          if [ -n "$BAD_RPATHS" ]; then
            echo "::error::Bare relative LC_RPATH entries (hardened runtime rejects these at launch):"
            echo "$BAD_RPATHS"
            exit 1
          fi
          test -f "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Sparkle" \
            || { echo "::error::Sparkle.framework missing from app bundle"; exit 1; }
          test -x "$APP/Contents/Resources/node/bin/node" \
            || { echo "::error::bundled Node runtime missing from app bundle"; exit 1; }
          test -f "$APP/Contents/Resources/sidecar/dist/index.js" \
            || { echo "::error::bundled sidecar entry missing from app bundle"; exit 1; }
          echo "    rpaths OK; Sparkle + bundled sidecar embedded."

          echo "==> Notarizing app"
          ditto -c -k --keepParent "$APP" /tmp/gemdex-app.zip
          xcrun notarytool submit /tmp/gemdex-app.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait

          echo "==> Stapling app"
          xcrun stapler staple "$APP"
          spctl --assess -vv --type execute "$APP"

          echo "==> Building + notarizing DMG"
          SIGN_IDENTITY="$IDENTITY" VOLUME_NAME="Gemdex Memory" \
            bash macos/package-dmg.sh "$APP" "$DMG"

          echo "DMG_PATH=packages/app/$DMG" >> "$GITHUB_ENV"
          echo "DMG_NAME=$(basename "$DMG")" >> "$GITHUB_ENV"

      - name: Generate signed appcast.xml
        working-directory: packages/app
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is empty — cannot sign the appcast."
            exit 1
          fi
          DMG="build/$DMG_NAME"
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          # sign_update emits: sparkle:edSignature="..." length="..."
          ENCLOSURE_ATTRS="$(./third_party/sparkle/bin/sign_update --ed-key-file "$KEY_FILE" "$DMG")"
          echo "Enclosure attrs: $ENCLOSURE_ATTRS"

          # make_latest keeps this URL pointing at the newest release's asset, so
          # it matches the SUFeedURL baked into the app (…/latest/download/…).
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/${DMG_NAME}"
          PUB_DATE="$(date -u +'%a, %d %b %Y %H:%M:%S +0000')"

          APPCAST="build/appcast.xml"
          cat > "$APPCAST" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Gemdex Memory</title>
              <link>https://github.com/${GITHUB_REPOSITORY}</link>
              <description>Gemdex Memory desktop app updates.</description>
              <language>en</language>
              <item>
                <title>Version ${APP_VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${APP_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${APP_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}" type="application/octet-stream" ${ENCLOSURE_ATTRS} />
              </item>
            </channel>
          </rss>
          EOF
          echo "APPCAST_PATH=packages/app/$APPCAST" >> "$GITHUB_ENV"
          echo "==> appcast.xml:"; cat "$APPCAST"

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Gemdex Memory v${{ needs.prepare.outputs.version }}
          prerelease: false
          # make_latest:true keeps …/releases/latest/download/{appcast.xml,DMG}
          # — the URLs baked into the app's SUFeedURL — pointed at this build.
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.APPCAST_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
