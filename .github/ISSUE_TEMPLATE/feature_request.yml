name: ✨ Feature request
description: Propose a new capability, language, integration, or workflow.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point you're hitting today.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Gemdex do? Sketch an API, a CLI command, a config flag — whatever's clearest.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, related tools, or why existing options don't fit.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, example codebases, anything else useful.
